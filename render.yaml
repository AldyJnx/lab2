services:
  - type: web
    name: usuarios-crud-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: usuarios-db
          property: connectionString

databases:
  - name: usuarios-db
    plan: free
    databaseName: usuarios_db
    user: usuarios_user
