<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Usuarios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .btn-cancel {
            background: #757575;
            color: white;
            margin-left: 10px;
        }

        .btn-cancel:hover {
            background: #616161;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        th {
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #757575;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Usuarios</h1>

        <div id="alert" class="alert"></div>

        <div class="card form-section">
            <h2 id="formTitle">Agregar Nuevo Usuario</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ingrese el nombre completo">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="usuario@ejemplo.com">
                </div>
                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad" min="1" max="120" placeholder="Ingrese la edad">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Agregar Usuario</button>
                <button type="button" class="btn btn-cancel" id="cancelBtn" style="display: none;">Cancelar</button>
            </form>
        </div>

        <div class="card">
            <h2>Lista de Usuarios</h2>
            <div id="loading" class="loading" style="display: none;">Cargando usuarios...</div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:3000/api/usuarios'
            : '/api/usuarios';

        let editMode = false;

        // Cargar usuarios al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
        });

        // Manejar envío del formulario
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userData = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                edad: document.getElementById('edad').value || null
            };

            if (editMode) {
                const userId = document.getElementById('userId').value;
                await updateUser(userId, userData);
            } else {
                await createUser(userData);
            }
        });

        // Botón cancelar
        document.getElementById('cancelBtn').addEventListener('click', () => {
            resetForm();
        });

        // Cargar usuarios
        async function loadUsers() {
            const loading = document.getElementById('loading');
            const tableContainer = document.getElementById('tableContainer');

            loading.style.display = 'block';
            tableContainer.innerHTML = '';

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    renderTable(data.data);
                } else {
                    tableContainer.innerHTML = '<div class="empty-state">No hay usuarios registrados</div>';
                }
            } catch (error) {
                showAlert('Error al cargar usuarios: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        // Renderizar tabla
        function renderTable(users) {
            const tableContainer = document.getElementById('tableContainer');

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Edad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.nombre}</td>
                                <td>${user.email}</td>
                                <td>${user.edad || 'N/A'}</td>
                                <td>
                                    <div class="actions">
                                        <button class="btn btn-edit" onclick="editUser(${user.id}, '${user.nombre.replace(/'/g, "\\'")}', '${user.email}', ${user.edad})">Editar</button>
                                        <button class="btn btn-delete" onclick="deleteUser(${user.id})">Eliminar</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = table;
        }

        // Crear usuario
        async function createUser(userData) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Usuario creado exitosamente', 'success');
                    resetForm();
                    loadUsers();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Error al crear usuario: ' + error.message, 'error');
            }
        }

        // Editar usuario
        function editUser(id, nombre, email, edad) {
            editMode = true;
            document.getElementById('formTitle').textContent = 'Editar Usuario';
            document.getElementById('userId').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('email').value = email;
            document.getElementById('edad').value = edad || '';
            document.getElementById('submitBtn').textContent = 'Actualizar Usuario';
            document.getElementById('cancelBtn').style.display = 'inline-block';

            // Scroll al formulario
            document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Actualizar usuario
        async function updateUser(id, userData) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Usuario actualizado exitosamente', 'success');
                    resetForm();
                    loadUsers();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Error al actualizar usuario: ' + error.message, 'error');
            }
        }

        // Eliminar usuario
        async function deleteUser(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este usuario?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Usuario eliminado exitosamente', 'success');
                    loadUsers();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('Error al eliminar usuario: ' + error.message, 'error');
            }
        }

        // Resetear formulario
        function resetForm() {
            editMode = false;
            document.getElementById('formTitle').textContent = 'Agregar Nuevo Usuario';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('submitBtn').textContent = 'Agregar Usuario';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // Mostrar alertas
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
